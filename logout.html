<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sesión Cerrada - BMC Helix</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url('https://res.cloudinary.com/dgygyevf5/image/upload/v1777067563/CLARO-CENTRO-DE-DATOS-2_u3iafu.jpg');
            background-size: cover;
            background-position: center;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 16px;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .logo {
            width: 120px;
            margin-bottom: 20px;
        }

        .image {
            width: 160px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 10px;
        }

        p {
            font-size: 14px;
            color: #555;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            padding: 12px 20px;
            background: #de4332;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
        }

        .btn:hover {
            background: #e64e17;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #777;
        }
    </style>

    <!-- Limpieza básica (no toca ISAM, pero ayuda UX) -->
    <script>
        try {
            localStorage.clear();
            sessionStorage.clear();
        } catch(e) {}
    </script>

</head>

<body>

<div class="container">

    <img src="https://res.cloudinary.com/dgygyevf5/image/upload/v1777066817/cerrar-sesion_e836by.png" class="logo" alt="logout">

    <img src="https://res.cloudinary.com/dgygyevf5/image/upload/v1777066778/BMC-Helix-Logo_az4q3o.png" class="image" alt="BMC Helix">

    <h1>Sesión cerrada correctamente</h1>

    <p>
        Tu sesión ha sido cerrada.<br>
        Para continuar, inicia sesión nuevamente en la plataforma.
    </p>

    <a href="https://datacenterclaroperu-itom-dev.onbmc.com" class="btn">
        Volver a iniciar sesión
    </a>

    <div class="footer">
        © 2026 Automatizaciones Procesos
    </div>

</div>

</body>
</html>
