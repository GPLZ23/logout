<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Sesión Cerrada - BMC Helix</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fuente moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #f7f9fc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url('https://res.cloudinary.com/dgygyevf5/image/upload/v1777067563/CLARO-CENTRO-DE-DATOS-2_u3iafu.jpg');
            background-size: cover;
            background-position: center;
        }

        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #6b7280, #3b82f6);
            z-index: -1;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.774);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            max-width: 420px;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            width: 120px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 10px;
        }

        p {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            padding: 12px 20px;
            background: #de4332;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #e64e17;
        }

        .image {
            width: 180px;
            margin-bottom: 20px;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #848993;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- Logo opcional -->
        <img src="https://res.cloudinary.com/dgygyevf5/image/upload/v1777066817/cerrar-sesion_e836by.png" class="logo"
            alt="BMC Helix">

        <!-- Ilustración -->
        <img src="https://res.cloudinary.com/dgygyevf5/image/upload/v1777066778/BMC-Helix-Logo_az4q3o.png" class="image"
            alt="logout">
        <h1>Sesión cerrada correctamente</h1>

        <p>
            Has cerrado sesión en la plataforma BMC Helix.
            Si deseas continuar, puedes volver a iniciar sesión.
        </p>

        <a href="https://oidc2.claro.com.pe/mga/sps/oauth/oauth20/authorize?client_id=oidc2&response_type=code&redirect_uri=https://datacenterclaroperu-rsso-dev.onbmc.com/rsso/redirect&scope=openid%20profile" class="btn">Volver a iniciar sesión</a>

        <div class="footer">
            © 2026 Automatizaciones Procesos - Todos los derechos reservados
        </div>

    </div>

</body>

</html>
