<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Logout</title>
</head>

<body>

<script>
    // =========================
    // LIMPIAR SESIÓN LOCAL
    // =========================
    try {
        localStorage.clear();
        sessionStorage.clear();
    } catch (e) {}

    // =========================
    // URL FINAL LIMPIA
    // =========================
    const finalURL = "https://datacenterclaroperu-itom-dev.onbmc.com/admin/#/landing";

    // =========================
    // LOGOUT ISAM EN BACKGROUND (OCULTO)
    // =========================
    const iframe = document.createElement("iframe");
    iframe.style.display = "none";
    iframe.src = "https://oidc2.claro.com.pe/pkmslogout";

    document.body.appendChild(iframe);

    // =========================
    // REDIRECCIÓN FINAL (SOLO HELIX VISIBLE)
    // =========================
    setTimeout(() => {
        window.location.replace(finalURL);
    }, 1500);
</script>

</body>
</html>
